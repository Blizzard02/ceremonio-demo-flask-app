<svg class="ceremio-logo" viewBox="0 0 64 64" role="img" aria-label="Ceremonio">
  <defs>
    <linearGradient id="cmTile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fdeef6"/>
      <stop offset="1" stop-color="#f7cbe1"/>
    </linearGradient>
    <radialGradient id="cmGlow" cx="0.30" cy="0.24" r="0.9">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".55"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <path id="cmPetal" d="M0 -1.1 C 3.0 -2.1 3.3 -6.2 1.3 -7.7 C 0.6 -8.2 0.3 -7.4 0 -7.0 C -0.3 -7.4 -0.6 -8.2 -1.3 -7.7 C -3.3 -6.2 -3.0 -2.1 0 -1.1 Z" fill="#ffffff"/>
    <g id="cmBloom">
      <use href="#cmPetal" transform="rotate(0)"/>
      <use href="#cmPetal" transform="rotate(72)"/>
      <use href="#cmPetal" transform="rotate(144)"/>
      <use href="#cmPetal" transform="rotate(216)"/>
      <use href="#cmPetal" transform="rotate(288)"/>
      <circle r="2.0" fill="#f7b9d4"/>
      <circle r="0.95" fill="#f4b73f"/>
    </g>
  </defs>

  <!-- soft-pink app tile -->
  <rect x="0" y="0" width="64" height="64" rx="16" fill="url(#cmTile)"/>
  <rect x="0" y="0" width="64" height="64" rx="16" fill="url(#cmGlow)"/>

  <!-- the "C" as a cherry-blossom branch, open to the right -->
  <path d="M45 19 A18 18 0 1 0 45 45" fill="none" stroke="#834f63" stroke-width="5.2" stroke-linecap="round"/>

  <!-- leaves on the branch -->
  <ellipse cx="12.5" cy="29.5" rx="3.0" ry="1.6" fill="#a7c9a4" transform="rotate(-38 12.5 29.5)"/>
  <ellipse cx="20"   cy="44"   rx="2.6" ry="1.4" fill="#a7c9a4" transform="rotate(28 20 44)"/>

  <!-- buds -->
  <circle cx="22.5" cy="13.8" r="1.9" fill="#f9c6dc"/>
  <circle cx="40.5" cy="15.2" r="1.6" fill="#fbd5e6"/>

  <!-- blossoms clustered along the branch -->
  <g transform="translate(31 16) scale(1.2)"><use href="#cmBloom"/></g>
  <g transform="translate(15.5 28) scale(0.92)"><use href="#cmBloom"/></g>
  <g transform="translate(44.5 45) scale(0.86)"><use href="#cmBloom"/></g>
</svg>
