<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ceremonio — Εκτός σύνδεσης</title>
  <style>
    body { font-family: Arial, sans-serif; background: linear-gradient(180deg, #fdf2f8, #f5f3ff);
           color: #374151; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: #fff; border-radius: 18px; padding: 32px; max-width: 420px; margin: 20px;
            box-shadow: 0 10px 30px rgba(124,58,237,0.12); text-align: center; }
    h1 { color: #7c3aed; margin-bottom: 8px; }
    p { line-height: 1.6; }
    button { margin-top: 16px; background: #7c3aed; color: #fff; border: 0; border-radius: 10px;
             padding: 12px 20px; font-size: 16px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="card">
    <h1>📡 Είσαι εκτός σύνδεσης</h1>
    <p>Το Ceremonio χρειάζεται σύνδεση στο διαδίκτυο για να φορτώσει τα δεδομένα σου. Έλεγξε τη σύνδεσή σου και δοκίμασε ξανά.</p>
    <button onclick="location.reload()">Δοκίμασε ξανά</button>
  </div>
</body>
</html>
